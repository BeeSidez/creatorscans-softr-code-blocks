name: Fetch Full Softr Schema

# Fetches the full schema for every Softr database the SOFTR_API_KEY can see
# (or just one, if you pass a database_id input) and regenerates:
#   - docs/softr-schema.md          human-readable markdown
#   - docs/softr-schema-full.json   raw JSON dump
#
# Run from: GitHub -> Actions -> "Fetch Full Softr Schema" -> "Run workflow".

on:
  workflow_dispatch:
    inputs:
      database_id:
        description: "Optional: limit to one database ID. Leave blank to fetch all databases."
        required: false
        default: ""
      sample_limit:
        description: "Sample records to fetch per table (default 2)"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch schema
        env:
          SOFTR_API_KEY: ${{ secrets.SOFTR_API_KEY }}
          DB_FILTER: ${{ github.event.inputs.database_id }}
          SAMPLE_LIMIT: ${{ github.event.inputs.sample_limit }}
        run: |
          set -euo pipefail
          if [ -z "${SOFTR_API_KEY:-}" ]; then
            echo "::error::SOFTR_API_KEY secret is not set on this repository."
            echo "Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          python3 scripts/fetch-softr-full-schema.py

      - name: Commit and push schema
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/softr-schema.md docs/softr-schema-full.json
          if git diff --cached --quiet; then
            echo "No schema changes to commit."
          else
            git commit -m "Refresh full Softr schema (via fetch-full-schema workflow)"
            git push origin "HEAD:${{ github.ref_name }}"
            echo "Pushed schema refresh to ${{ github.ref_name }}"
          fi
